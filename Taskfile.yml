version: "3"

vars:
  PROJECT_NAME: policy-go
  # Workspace modules. Each is built/tested independently; root is workspace-only.
  MODULES: proto policy backend/teroscan backend/hyperscan examples

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Build tasks
  build:
    desc: Build all modules
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go build ./...)

  clean:
    desc: Clean build artifacts
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go clean ./...)
      - rm -rf coverage/

  # Code quality
  format:
    desc: Format code
    cmds:
      - gofmt -w .

  format:check:
    desc: Check code formatting
    cmds:
      - test -z "$(gofmt -l .)"

  lint:
    desc: Run linter across all modules
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go vet ./...)

  # Testing
  test:
    desc: Run tests across all modules
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go test ./...)

  test:verbose:
    desc: Run tests with verbose output
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go test -v ./...)

  test:coverage:
    desc: Run tests with coverage (core module)
    cmds:
      - mkdir -p coverage
      - (cd policy && go test -coverprofile=../coverage/coverage.out ./...)
      - go tool cover -html=coverage/coverage.out -o coverage/coverage.html

  # Benchmarks
  bench:
    desc: Run benchmarks
    cmds:
      - (cd policy && go test -bench=. -benchmem ./bench/...)

  bench:backends:
    desc: Compare teroscan vs hyperscan across policy counts (logs/metrics/traces; needs cgo)
    cmds:
      - (cd examples && go test -bench=BenchmarkBackends -benchmem ./backendbench/)

  # Validate a policy JSON file.
  # Usage: task validate FILE=path/to/policies.json
  validate:
    desc: Validate a policy JSON file (task validate FILE=<path>)
    cmds:
      - |
        FILE="{{.FILE}}"
        [[ "$FILE" = /* ]] || FILE="$PWD/$FILE"
        cd "{{.TASKFILE_DIR}}/examples" && go run ./validate/ --file "$FILE"

  # Conformance: run the policy-conformance testcases against the local workspace.
  # Requires ../policy-conformance to exist (sibling directory).
  # POLICY_BACKEND env var is inherited by the runner; defaults to teroscan.
  conformance:build:
    desc: Build the conformance runner binary (examples/conformance/runner)
    dir: examples
    cmds:
      - go build -o conformance/runner ./conformance/

  conformance:teroscan:
    desc: Run conformance testcases with the teroscan (pure-Go) backend
    deps: [conformance:build]
    cmds:
      - task: conformance:run
        vars: { BACKEND: teroscan }

  conformance:hyperscan:
    desc: Run conformance testcases with the hyperscan (cgo) backend (needs cgo)
    deps: [conformance:build]
    cmds:
      - task: conformance:run
        vars: { BACKEND: hyperscan }

  conformance:run:
    desc: Run conformance loop; called by conformance:teroscan / conformance:hyperscan
    internal: true
    vars:
      BACKEND: '{{.BACKEND | default "teroscan"}}'
      RUNNER: '{{.TASKFILE_DIR}}/examples/conformance/runner'
      TESTCASES: '{{.TASKFILE_DIR}}/../policy-conformance/testcases'
    cmds:
      - |
        export POLICY_BACKEND="{{.BACKEND}}"
        set +e
        RUNNER="{{.RUNNER}}"
        TC_DIR="{{.TESTCASES}}"

        if [ ! -d "$TC_DIR" ]; then
          echo "SKIP: $TC_DIR not found (clone policy-conformance as a sibling of policy-go)"
          exit 0
        fi

        # Normalize proto JSON: strip defaults (null/""/0/{}/[]/false/unspecified enums),
        # coerce string-encoded integers, map enum strings to numbers.
        # Copied from policy-conformance Taskfile.
        normalize='def enums: {"SPAN_KIND_INTERNAL":1,"SPAN_KIND_SERVER":2,"SPAN_KIND_CLIENT":3,"SPAN_KIND_PRODUCER":4,"SPAN_KIND_CONSUMER":5,"STATUS_CODE_OK":1,"STATUS_CODE_ERROR":2,"AGGREGATION_TEMPORALITY_DELTA":1,"AGGREGATION_TEMPORALITY_CUMULATIVE":2,"SEVERITY_NUMBER_TRACE":1,"SEVERITY_NUMBER_TRACE2":2,"SEVERITY_NUMBER_TRACE3":3,"SEVERITY_NUMBER_TRACE4":4,"SEVERITY_NUMBER_DEBUG":5,"SEVERITY_NUMBER_DEBUG2":6,"SEVERITY_NUMBER_DEBUG3":7,"SEVERITY_NUMBER_DEBUG4":8,"SEVERITY_NUMBER_INFO":9,"SEVERITY_NUMBER_INFO2":10,"SEVERITY_NUMBER_INFO3":11,"SEVERITY_NUMBER_INFO4":12,"SEVERITY_NUMBER_WARN":13,"SEVERITY_NUMBER_WARN2":14,"SEVERITY_NUMBER_WARN3":15,"SEVERITY_NUMBER_WARN4":16,"SEVERITY_NUMBER_ERROR":17,"SEVERITY_NUMBER_ERROR2":18,"SEVERITY_NUMBER_ERROR3":19,"SEVERITY_NUMBER_ERROR4":20,"SEVERITY_NUMBER_FATAL":21,"SEVERITY_NUMBER_FATAL2":22,"SEVERITY_NUMBER_FATAL3":23,"SEVERITY_NUMBER_FATAL4":24}; walk(if type == "object" then with_entries(select(.value != null and .value != [] and .value != "" and .value != 0 and .value != {} and .value != false and (.value | IN("SEVERITY_NUMBER_UNSPECIFIED","STATUS_CODE_UNSET","SPAN_KIND_UNSPECIFIED","AGGREGATION_TEMPORALITY_UNSPECIFIED") | not)) | if .value | type == "string" then .value = (enums[.value] // .value) else . end) elif type == "string" and test("^[0-9]+$") then tonumber elif type == "number" and (. | floor) == . then (. | floor) else . end)'
        detect_signal='if .resourceLogs then "log" elif .resourceMetrics then "metric" elif .resourceSpans then "trace" else "unknown" end'
        merge_stats='[.[].policies[]] | group_by(.policy_id) | map({policy_id: .[0].policy_id, hits: (map(.hits) | add), misses: (map(.misses // 0) | add)}) | map(if .misses == 0 then del(.misses) else . end) | sort_by(.policy_id) | {policies: .}'

        PASS=0; FAIL=0
        for tc in "$TC_DIR"/*/; do
          name=$(basename "$tc")

          # Skip testcases that require an HTTP/gRPC provider
          if [ -f "${tc}provider_only" ]; then
            continue
          fi

          # Collect all input files (input.json or input_N.json)
          inputs=$(ls "$tc"input.json "$tc"input_*.json 2>/dev/null)
          if [ -z "$inputs" ]; then
            continue
          fi

          tc_fail=0
          stats_files=""

          for input in $inputs; do
            suffix=$(basename "$input" .json | sed 's/^input//')  # "" or "_1" etc.
            if [ -z "$suffix" ]; then
              expected="$tc/expected.json"
            else
              expected="$tc/expected${suffix}.json"
            fi
            [ -f "$expected" ] || continue

            signal=$(jq -r "$detect_signal" "$input" 2>/dev/null)
            if [ "$signal" = "unknown" ] || [ -z "$signal" ]; then
              continue
            fi

            tmpout=$(mktemp)
            tmpstats=$(mktemp)
            err=$("$RUNNER" --policies "$tc/policies.json" --input "$input" --output "$tmpout" --stats "$tmpstats" --signal "$signal" 2>&1)
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "FAIL $name${suffix}: runner exited $rc: $err"
              tc_fail=1
            else
              got=$(jq -S "$normalize" "$tmpout" 2>/dev/null)
              exp=$(jq -S "$normalize" "$expected" 2>/dev/null)
              if [ "$got" != "$exp" ]; then
                echo "FAIL $name${suffix}: output mismatch"
                diff <(echo "$exp") <(echo "$got")
                tc_fail=1
              fi
              stats_files="$stats_files $tmpstats"
            fi
            rm -f "$tmpout"
          done

          # Compare merged stats if expected_stats.json exists
          if [ -f "$tc/expected_stats.json" ] && [ -n "$stats_files" ]; then
            got_stats=$(jq -sS "$merge_stats" $stats_files 2>/dev/null)
            exp_stats=$(jq -S "$merge_stats" "$tc/expected_stats.json" 2>/dev/null || jq -S '.' "$tc/expected_stats.json" 2>/dev/null)
            if [ "$got_stats" != "$exp_stats" ]; then
              echo "FAIL $name: stats mismatch"
              diff <(echo "$exp_stats") <(echo "$got_stats")
              tc_fail=1
            fi
          fi
          rm -f $stats_files

          if [ $tc_fail -eq 0 ]; then
            PASS=$((PASS+1))
          else
            FAIL=$((FAIL+1))
          fi
        done

        echo ""
        echo "Results (POLICY_BACKEND={{.BACKEND}}): PASS=$PASS FAIL=$FAIL"
        [ $FAIL -eq 0 ]

  bench:cpu:
    desc: Run benchmarks with CPU profiling
    cmds:
      - mkdir -p profiles
      - (cd policy && go test -bench=. -benchmem -cpuprofile=../profiles/cpu.prof ./bench/...)
      - echo "CPU profile saved to profiles/cpu.prof"
      - echo "View with 'go tool pprof profiles/cpu.prof'"

  bench:mem:
    desc: Run benchmarks with memory profiling
    cmds:
      - mkdir -p profiles
      - (cd policy && go test -bench=. -benchmem -memprofile=../profiles/mem.prof ./bench/...)
      - echo "Memory profile saved to profiles/mem.prof"
      - echo "View with 'go tool pprof profiles/mem.prof'"

  bench:compare:
    desc: Run benchmarks and save for comparison
    cmds:
      - (cd policy && go test -bench=. -benchmem -count=10 ./bench/...) | tee bench.txt
      - echo "Results saved to bench.txt"
      - echo "Compare with 'benchstat old.txt new.txt'"

  # Dependencies
  deps:
    desc: Download dependencies
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go mod download)

  deps:tidy:
    desc: Tidy dependencies
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go mod tidy)

  deps:update:
    desc: Update dependencies
    cmds:
      - for: { var: MODULES }
        cmd: (cd {{.ITEM}} && go get -u ./... && go mod tidy)

  # Documentation
  docs:
    desc: Generate documentation
    cmds:
      - (cd policy && go doc -all ./...)

  # Development workflows
  do:
    desc: Format, lint, and test
    aliases: [d]
    cmds:
      - task: format
      - task: lint
      - task: test
      - echo "All checks passed"

  release:
    desc: Run all checks and build release
    aliases: [r]
    cmds:
      - task: do
      - task: build
      - echo "Release build complete"

  signoff:
    desc: Run checks and sign off
    aliases: [sign, s]
    deps: [do]
    cmds:
      - gh signoff

  # Information
  info:
    desc: Display project information
    cmds:
      - echo "Project - {{.PROJECT_NAME}}"
      - go version
      - go env GOVERSION GOOS GOARCH

  # CI
  ci:setup:
    desc: "🔧 Install CI/development dependencies (idempotent, safe to run locally)"
    dir: "{{.TASKFILE_DIR}}"
    cmds:
      - |
        echo "🔧 Setting up CI environment..."

        # Clean up Docker resources to free disk space (important for CI with testcontainers)
        if [ -n "$CI" ]; then
          echo "🧹 Cleaning Docker resources in CI..."
          docker system prune -af --volumes 2>/dev/null || true
        fi

        echo "🔧 Checking for required dependencies..."

        # Check for hyperscan/vectorscan (needed for pattern matching)
        if ! pkg-config --exists libhs 2>/dev/null; then
          echo "📦 Installing vectorscan..."
          if [ "$(uname)" = "Darwin" ]; then
            # macOS: use vectorscan (hyperscan replacement)
            if command -v brew >/dev/null 2>&1; then
              brew install vectorscan pkg-config
            else
              echo "⚠️  Homebrew not found. Install vectorscan manually or use Hermit."
            fi
          elif [ "$(uname)" = "Linux" ]; then
            # Linux: use hyperscan
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y libhyperscan-dev pkg-config
            elif command -v yum >/dev/null 2>&1; then
              sudo yum install -y hyperscan-devel pkg-config
            else
              echo "⚠️  Unknown package manager. Install hyperscan manually."
            fi
          else
            echo "⚠️  Unknown platform: $(uname)"
          fi
        else
          echo "✅ Hyperscan/Vectorscan already installed"
        fi

        # Install golangci-lint. Pinned version installed via `go install` so
        # we don't depend on the upstream install.sh's checksum manifest (which
        # has occasionally desynced from release artifacts, causing CI breaks).
        GOLANGCI_LINT_VERSION="v2.12.1"
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "📦 Installing golangci-lint $GOLANGCI_LINT_VERSION..."
          GOBIN="$(go env GOPATH)/bin" go install "github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}"
        else
          echo "✅ golangci-lint already installed ($(golangci-lint --version 2>/dev/null | head -1))"
        fi

        echo "✅ CI setup complete"

  ci:
    desc: Run CI pipeline
    cmds:
      - task: format:check
      - task: lint
      - task: test
      - task: build

  # Proto (its own module under proto/; go_package = github.com/usetero/policy-go/proto/...)
  proto:export:
    desc: Export proto files from buf registry
    dir: proto
    cmds:
      - buf export buf.build/opentelemetry/opentelemetry -o .
      - buf export buf.build/tero/policy -o .

  proto:generate:
    desc: Generate Go code from proto files
    deps: [proto:export]
    dir: proto
    cmds:
      - buf generate .

  proto:clean:
    desc: Clean generated proto files
    dir: proto
    cmds:
      - find . -name '*.pb.go' -delete
